services:
  api-gastos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-controle-gastos
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/database/ControleGastos.db
    volumes:
      - ./database:/app/database